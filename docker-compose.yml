services:
  # Frontend - Next.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fintech_frontend
    ports:
      - "3000:3000"
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_ML_SERVICE_URL=http://localhost:8001   # AI Pattern Detection
    depends_on:
      - backend
      - ml-service
    networks:
      - fintech_network

  # Backend - FastAPI (Core API)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fintech_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@db:5432/fintech_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - fintech_network

  # ML Service - FastAPI (AI/ML) + Pattern Detection Engine
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: fintech_ml_service
    ports:
      - "8001:8001"
    volumes:
      - ./ml-service:/app
      - ml_models:/app/models    # persist trained weights across rebuilds
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@db:5432/fintech_db
      - REDIS_URL=redis://redis:6379/0
      - PATTERN_MODEL_PATH=/app/models/cnn_transformer_best.pt
      - YOLO_MODEL_PATH=/app/models/yolo_best.pt
    depends_on:
      - db
      - redis
    networks:
      - fintech_network

  # Database - PostgreSQL with TimescaleDB
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: fintech_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=fintech_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fintech_network
    restart: always

  # Caching & Queue - Redis
  redis:
    image: redis:7-alpine
    container_name: fintech_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - fintech_network
    restart: always

  # ML Experiment Tracking - MLflow
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.1
    container_name: fintech_mlflow
    ports:
      - "5001:5000"
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
    volumes:
      - mlflow_data:/mlflow/artifacts
    depends_on:
      - db
    networks:
      - fintech_network

  # Task Queue Monitor - Flower
  flower:
    image: mher/flower
    container_name: fintech_flower
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - fintech_network

networks:
  fintech_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  mlflow_data:
  ml_models:       # named volume for persisting trained model weights
