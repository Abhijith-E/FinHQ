version: '3.8'

services:
  # Frontend - Next.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fintech_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    command: npm run dev
    networks:
      - fintech_network

  # Backend - FastAPI (Core API)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fintech_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@db:5432/fintech_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - fintech_network

  # ML Service - FastAPI (AI/ML)
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: fintech_ml_service
    ports:
      - "8001:8001"
    volumes:
      - ./ml-service:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@db:5432/fintech_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - fintech_network

  # Database - PostgreSQL with TimescaleDB
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: fintech_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=fintech_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fintech_network
    restart: always

  # Caching & Queue - Redis
  redis:
    image: redis:7-alpine
    container_name: fintech_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - fintech_network
    restart: always

networks:
  fintech_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
